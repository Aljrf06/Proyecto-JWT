<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — JWT App</title>
    <link rel="stylesheet" href="estilos.css" />
</head>
<body>

<div class="card">

    <!-- Encabezado -->
    <div class="card-header">
        <div class="badge"><span></span>Spring Boot · JWT</div>
        <h1>Iniciar Sesión</h1>
        <p>Accede a tu cuenta con correo y contraseña</p>
    </div>

    <!-- Alerta de mensajes -->
    <div id="alerta" class="alert"></div>

    <!-- Formulario — usa onsubmit para llamar handleLogin() de auth.js -->
    <form onsubmit="handleLogin(event)">

        <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input
                    type="email"
                    id="correo"
                    placeholder="ejemplo@correo.com"
                    autocomplete="email"
                    required
            />
        </div>

        <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input
                    type="password"
                    id="contrasena"
                    placeholder="Tu contraseña"
                    autocomplete="current-password"
                    required
            />
        </div>

        <button type="submit" id="btnLogin" class="btn">
            Iniciar Sesión
        </button>

    </form>

    <div class="nav-link">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
    </div>

</div>

<script src="Auth.js"></script>
<script>
    // Si ya tiene sesión activa, ir directo al dashboard
    redirigirSiLogueado();
</script>
</body>
</html>
